name: CI/CD Pipeline

on:
  workflow_dispatch:

env:
  DOCKER_IMAGE: sidk27/ekart
  AWS_REGION: ap-south-1
  EKS_CLUSTER: project-cluster

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Compile
  # ──────────────────────────────────────────
  compile:
    name: Compile
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true
          sudo chown -R ubuntu:ubuntu /home/ubuntu/actions-runner/_work/ || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compile
        run: mvn compile

  # ──────────────────────────────────────────
  # JOB 2: Unit Tests
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    needs: compile
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compile
        run: mvn compile

      - name: Unit Tests
        run: mvn test -DskipTests=true

  # ──────────────────────────────────────────
  # JOB 3: SonarQube Analysis
  # ──────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: self-hosted
    needs: unit-tests
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compile
        run: mvn compile

      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=EKART \
            -Dsonar.projectName=EKART \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 4: OWASP Dependency Check
  # ──────────────────────────────────────────
  owasp:
    name: OWASP Dependency Check
    runs-on: self-hosted
    needs: sonarqube
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'EKART'
          path: '.'
          format: 'HTML'
          args: >
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --out reports/

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

      - name: Fix permissions after OWASP
        if: always()
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

  # ──────────────────────────────────────────
  # JOB 5: Build & Deploy to Nexus
  # ──────────────────────────────────────────
  build-and-nexus:
    name: Build and Deploy to Nexus
    runs-on: self-hosted
    needs: owasp
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build (Package)
        run: mvn package -DskipTests=true

      - name: Deploy to Nexus
        run: mvn deploy -DskipTests=true

  # ──────────────────────────────────────────
  # JOB 6: Docker Build & Push
  # ──────────────────────────────────────────
  docker:
    name: Docker Build and Push
    runs-on: self-hosted
    needs: build-and-nexus
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build and Tag Docker Image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:latest -f docker/Dockerfile .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push Docker Image
        run: docker push ${{ env.DOCKER_IMAGE }}:latest

  # ──────────────────────────────────────────
  # JOB 7: Deploy to EKS
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: self-hosted
    needs: docker
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R ubuntu:ubuntu $GITHUB_WORKSPACE || true

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to Kubernetes
        run: kubectl apply -f deploymentservice.yml
